name: Update Data

on:
  # Run weekly on Sundays at 00:00 UTC
  schedule:
    - cron: '0 0 * * 0'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  update-data:
    name: Update Countries/States/Cities Data
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        working-directory: python/packages/countries
        run: |
          pip install -e ".[dev]"
      
      - name: Download latest data
        run: |
          curl -L "https://raw.githubusercontent.com/dr5hn/countries-states-cities-database/refs/heads/master/json/countries%2Bstates%2Bcities.json.gz" \
            -o /tmp/countries-data.json.gz
          gunzip /tmp/countries-data.json.gz
          echo "Downloaded data size:"
          ls -lh /tmp/countries-data.json
      
      - name: Backup current data statistics
        run: |
          echo "=== Current Data Statistics ===" > /tmp/data-stats-before.txt
          if [ -f python/packages/countries/countrystatecity_countries/data/countries.json ]; then
            echo "Countries: $(cat python/packages/countries/countrystatecity_countries/data/countries.json | grep -o '"id"' | wc -l)" >> /tmp/data-stats-before.txt
            echo "Data files: $(find python/packages/countries/countrystatecity_countries/data -type f | wc -l)" >> /tmp/data-stats-before.txt
          else
            echo "No existing data found" >> /tmp/data-stats-before.txt
          fi
          cat /tmp/data-stats-before.txt
      
      - name: Generate new data structure
        run: |
          cd python/packages/countries
          python scripts/generate-data.py /tmp/countries-data.json
      
      - name: Collect new data statistics
        id: data-stats
        run: |
          echo "=== New Data Statistics ===" > /tmp/data-stats-after.txt
          echo "Countries: $(cat python/packages/countries/countrystatecity_countries/data/countries.json | grep -o '"id"' | wc -l)" >> /tmp/data-stats-after.txt
          echo "Data files: $(find python/packages/countries/countrystatecity_countries/data -type f | wc -l)" >> /tmp/data-stats-after.txt
          cat /tmp/data-stats-after.txt
          
          # Export for PR description
          COUNTRIES=$(cat python/packages/countries/countrystatecity_countries/data/countries.json | grep -o '"id"' | wc -l)
          FILES=$(find python/packages/countries/countrystatecity_countries/data -type f | wc -l)
          echo "countries=$COUNTRIES" >> $GITHUB_OUTPUT
          echo "files=$FILES" >> $GITHUB_OUTPUT
      
      - name: Run tests with new data
        working-directory: python/packages/countries
        run: |
          pytest --cov=countrystatecity_countries --cov-report=term
      
      - name: Type check
        working-directory: python/packages/countries
        run: |
          mypy countrystatecity_countries/ --strict
      
      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Check for changes
        id: check-changes
        run: |
          git add python/packages/countries/countrystatecity_countries/data
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No data changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Data changes detected"
          fi
      
      - name: Create Pull Request
        if: steps.check-changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update countries/states/cities data'
          title: '🔄 Automated Data Update from countries-states-cities-database'
          body: |
            ## Automated Data Update
            
            This PR contains the latest data from [countries-states-cities-database](https://github.com/dr5hn/countries-states-cities-database).
            
            ### Statistics
            - Countries: ${{ steps.data-stats.outputs.countries }}
            - Total data files: ${{ steps.data-stats.outputs.files }}
            
            ### Changes
            - Downloaded latest dataset from source repository
            - Regenerated countries/states/cities split data structure
            - All tests passing ✅
            
            ### Verification
            - ✅ Data generation completed successfully
            - ✅ Type checking passed (mypy strict)
            - ✅ All tests passing
            
            This is an automated pull request. Please review the changes before merging.
          branch: automated-data-update
          delete-branch: true
          labels: |
            automated
            data-update
      
      - name: No changes detected
        if: steps.check-changes.outputs.changed == 'false'
        run: |
          echo "✅ Data is already up to date. No PR created."
